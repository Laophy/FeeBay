<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>FeeBay — Steam Page Asset Generator</title>
  <style>
    body {
      margin: 0; padding: 24px;
      background: #1b1f24; color: #e8eaed;
      font-family: "Segoe UI", system-ui, sans-serif;
    }
    h1 { font-size: 18px; margin: 0 0 4px; }
    p.intro { color: #9aa0aa; font-size: 13px; margin: 0 0 18px; max-width: 720px; }
    .grid { display: flex; flex-direction: column; gap: 22px; }
    .asset {
      background: #23282e; border: 1px solid #343a42; border-radius: 10px;
      padding: 14px; display: flex; gap: 16px; align-items: center;
    }
    .asset .meta { min-width: 180px; }
    .asset .meta b { font-size: 14px; }
    .asset .meta span { display: block; color: #9aa0aa; font-size: 12px; margin-top: 2px; }
    .preview {
      background:
        repeating-conic-gradient(#2c3137 0% 25%, #262b30 0% 50%) 50% / 20px 20px;
      border-radius: 6px; overflow: hidden; flex: 1;
      display: flex; align-items: center; justify-content: center;
    }
    canvas { display: block; max-width: 100%; height: auto; max-height: 240px; }
    button {
      font: inherit; font-weight: 700; padding: 9px 16px; border-radius: 8px;
      border: none; background: #0064d2; color: #fff; cursor: pointer;
    }
    button:hover { background: #0053b0; }
    #save { background: #86b817; }
    #save:hover { background: #6c9512; }
    #save:disabled { background: #3a3f46; color: #6b7178; cursor: not-allowed; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    #status { color: #b6c46a; font-size: 13px; min-height: 18px; margin: 10px 0 16px; }
  </style>
</head>
<body>
  <h1>FeeBay — Steam Page Asset Generator</h1>
  <p class="intro">
    Generates every Steam store &amp; library image at the exact required pixel
    size as PNG, using real FeeBay card art (creature artwork + the in-game card
    frame). The Library Logo exports transparent; the Library Hero is art only
    (no text/logo), as Steam requires.
  </p>
  <div class="actions">
    <button id="save">Save all to SteamAssets folder…</button>
    <button id="all">Download all 9 PNGs</button>
  </div>
  <div id="status"></div>
  <div class="grid" id="grid"></div>

  <!-- Base64-inlined creature artwork (generated by scripts; data URIs so the
       canvas is never tainted and PNG export keeps working). -->
  <script src="feebay-card-images.js"></script>
  <script>
    const ASSETS = [
      { id: 'header_capsule',   label: 'Header Capsule',   w: 920,  h: 430,  kind: 'capsule' },
      { id: 'small_capsule',    label: 'Small Capsule',    w: 462,  h: 174,  kind: 'small' },
      { id: 'main_capsule',     label: 'Main Capsule',     w: 1232, h: 706,  kind: 'capsule' },
      { id: 'vertical_capsule', label: 'Vertical Capsule', w: 748,  h: 896,  kind: 'vertical' },
      { id: 'page_background',  label: 'Page Background',  w: 1438, h: 810,  kind: 'background' },
      { id: 'library_capsule',  label: 'Library Capsule',  w: 600,  h: 900,  kind: 'vertical' },
      { id: 'library_header',   label: 'Library Header',   w: 920,  h: 430,  kind: 'capsule' },
      { id: 'library_hero',     label: 'Library Hero',     w: 3840, h: 1240, kind: 'hero' },
      { id: 'library_logo',     label: 'Library Logo',     w: 1280, h: 720,  kind: 'logo' },
    ];

    const LETTERS = [
      ['F', '#e53238'], ['e', '#0064d2'], ['e', '#f5af02'],
      ['B', '#86b817'], ['a', '#e53238'], ['y', '#0064d2'],
    ];

    // Real cards from the game (src/data/cards.ts). The middle entry is the
    // hero card: a Bucket-graded Gem 10 slab anchoring the centre of the fan.
    const CARD_SAMPLES = [
      { id: 'azure-griffin',    name: 'Azure Griffin',    set: 'Skyborn Saga',   character: 'Beast',  hue: 210, rarity: 'Mythic Rare', hp: 163 },
      { id: 'golden-goblin',    name: 'Golden Goblin',    set: 'Treasure Trove', character: 'Goblin', hue: 45,  rarity: 'Holo Rare',   hp: 149 },
      { id: 'midnight-stalker', name: 'Midnight Stalker', set: 'Twilight Veil',  character: 'Beast',  hue: 240, rarity: 'Rare', hp: 118,
        slab: true, grade: 10, company: 'Bucket', cert: 'BKT 4F2A9C1' },
      { id: 'voidcaller',       name: 'Voidcaller',       set: 'Twilight Veil',  character: 'Demon',  hue: 280, rarity: 'Mythic Rare', hp: 158 },
      { id: 'aurora-finch',     name: 'Aurora Finch',     set: 'Skyborn Saga',   character: 'Bird',   hue: 295, rarity: 'Holo Rare',   hp: 135 },
    ];

    const RARITY_GLYPH = {
      Common: '●', Uncommon: '◆', Rare: '★', 'Holo Rare': '✦',
      'Secret Rare': '✺', 'Mythic Rare': '✺', Signed: '✍', 'Prototype Card': 'α',
    };

    const LOADED = {}; // card id -> HTMLImageElement

    function loadImages() {
      const map = window.FEEBAY_CARD_IMAGES || {};
      return Promise.all(
        CARD_SAMPLES.map(
          (s) =>
            new Promise((resolve) => {
              const src = map[s.id];
              if (!src) return resolve();
              const img = new Image();
              img.onload = () => {
                LOADED[s.id] = img;
                resolve();
              };
              img.onerror = () => resolve();
              img.src = src;
            }),
        ),
      );
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function drawBackground(ctx, W, H) {
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, '#ffffff');
      g.addColorStop(1, '#e7ecf0');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);

      let rg = ctx.createRadialGradient(W * 0.5, H * 0.06, 0, W * 0.5, H * 0.06, Math.max(W, H) * 0.75);
      rg.addColorStop(0, 'rgba(0,100,210,0.17)');
      rg.addColorStop(1, 'rgba(0,100,210,0)');
      ctx.fillStyle = rg;
      ctx.fillRect(0, 0, W, H);

      rg = ctx.createRadialGradient(W * 0.84, H * 0.98, 0, W * 0.84, H * 0.98, Math.max(W, H) * 0.65);
      rg.addColorStop(0, 'rgba(245,175,2,0.15)');
      rg.addColorStop(1, 'rgba(245,175,2,0)');
      ctx.fillStyle = rg;
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = 'rgba(15,23,42,0.05)';
      const step = Math.max(24, Math.round(W / 46));
      for (let y = step; y < H; y += step) {
        for (let x = step; x < W; x += step) {
          ctx.beginPath();
          ctx.arc(x, y, Math.max(1.2, W / 900), 0, Math.PI * 2);
          ctx.fill();
        }
      }

      const v = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.34, W / 2, H / 2, Math.max(W, H) * 0.74);
      v.addColorStop(0, 'rgba(0,0,0,0)');
      v.addColorStop(1, 'rgba(15,23,42,0.15)');
      ctx.fillStyle = v;
      ctx.fillRect(0, 0, W, H);
    }

    // Renders a realistic FeeBay card — the in-game card frame with creature art.
    function drawRealCard(ctx, cx, cy, w, rotDeg, s, img) {
      const h = w * 1.4;
      const r = w * 0.07;
      const pad = w * 0.06;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate((rotDeg * Math.PI) / 180);

      // Body + drop shadow
      ctx.save();
      ctx.shadowColor = 'rgba(15,23,42,0.42)';
      ctx.shadowBlur = w * 0.2;
      ctx.shadowOffsetY = w * 0.09;
      const body = ctx.createLinearGradient(-w / 2, -h / 2, w / 2, h / 2);
      body.addColorStop(0, `hsl(${s.hue},78%,56%)`);
      body.addColorStop(0.55, `hsl(${(s.hue + 30) % 360},82%,42%)`);
      body.addColorStop(1, `hsl(${(s.hue + 220) % 360},72%,26%)`);
      ctx.fillStyle = body;
      roundRect(ctx, -w / 2, -h / 2, w, h, r);
      ctx.fill();
      ctx.restore();

      // Clip inner content to the card shape
      ctx.save();
      roundRect(ctx, -w / 2, -h / 2, w, h, r);
      ctx.clip();

      // Header — card name
      ctx.textBaseline = 'top';
      ctx.textAlign = 'left';
      ctx.font = `700 ${w * 0.082}px "Segoe UI", system-ui, sans-serif`;
      let nm = s.name;
      const maxNameW = w - pad * 2 - w * 0.22;
      while (ctx.measureText(nm).width > maxNameW && nm.length > 3) nm = nm.slice(0, -1);
      if (nm !== s.name) nm = nm.trim() + '…';
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.55)';
      ctx.shadowBlur = w * 0.035;
      ctx.fillStyle = '#ffffff';
      ctx.fillText(nm, -w / 2 + pad, -h / 2 + pad * 0.95);
      ctx.restore();

      // HP badge
      ctx.font = `700 ${w * 0.058}px "Segoe UI", system-ui, sans-serif`;
      const hpTxt = `HP ${s.hp}`;
      const hpW = ctx.measureText(hpTxt).width + w * 0.07;
      const hpH = w * 0.105;
      ctx.fillStyle = 'rgba(0,0,0,0.42)';
      roundRect(ctx, w / 2 - pad - hpW, -h / 2 + pad * 0.85, hpW, hpH, w * 0.025);
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.fillText(hpTxt, w / 2 - pad - hpW / 2, -h / 2 + pad * 0.85 + hpH * 0.24);

      // Art window
      const winX = -w / 2 + pad;
      const winY = -h / 2 + h * 0.165;
      const winW = w - pad * 2;
      const winH = h * 0.54;
      const ig = ctx.createLinearGradient(0, winY, 0, winY + winH);
      ig.addColorStop(0, `hsl(${s.hue},60%,33%)`);
      ig.addColorStop(1, `hsl(${(s.hue + 200) % 360},60%,15%)`);
      ctx.fillStyle = ig;
      roundRect(ctx, winX, winY, winW, winH, r * 0.5);
      ctx.fill();

      // Creature artwork (pixel art — keep it crisp)
      if (img && img.width) {
        ctx.save();
        roundRect(ctx, winX, winY, winW, winH, r * 0.5);
        ctx.clip();
        ctx.imageSmoothingEnabled = false;
        const scale = Math.min((winW * 0.86) / img.width, (winH * 0.86) / img.height);
        const iw = img.width * scale;
        const ih = img.height * scale;
        ctx.drawImage(img, -iw / 2, winY + winH / 2 - ih / 2, iw, ih);
        ctx.restore();
      }

      // Footer — character / set + rarity glyph
      ctx.textBaseline = 'alphabetic';
      ctx.textAlign = 'left';
      ctx.font = `600 ${w * 0.05}px "Segoe UI", system-ui, sans-serif`;
      let foot = `${s.character} • ${s.set}`.toUpperCase();
      const maxFootW = w - pad * 2 - w * 0.12;
      while (ctx.measureText(foot).width > maxFootW && foot.length > 3) foot = foot.slice(0, -1);
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.55)';
      ctx.shadowBlur = w * 0.025;
      ctx.fillStyle = 'rgba(255,255,255,0.88)';
      ctx.fillText(foot, -w / 2 + pad, h / 2 - pad * 0.95);
      ctx.font = `700 ${w * 0.078}px "Segoe UI", system-ui, sans-serif`;
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'right';
      ctx.fillText(RARITY_GLYPH[s.rarity] || '★', w / 2 - pad, h / 2 - pad * 0.78);
      ctx.restore();

      // Holographic sheen
      const sheen = ctx.createLinearGradient(-w / 2, -h / 2, w / 2, h / 2);
      sheen.addColorStop(0.28, 'rgba(255,255,255,0)');
      sheen.addColorStop(0.47, 'rgba(255,255,255,0.5)');
      sheen.addColorStop(0.66, 'rgba(255,255,255,0)');
      ctx.globalCompositeOperation = 'screen';
      ctx.fillStyle = sheen;
      ctx.fillRect(-w / 2, -h / 2, w, h);
      ctx.globalCompositeOperation = 'source-over';

      ctx.restore(); // unclip

      // Yellow card frame
      ctx.lineWidth = w * 0.045;
      ctx.strokeStyle = '#f5af02';
      roundRect(ctx, -w / 2, -h / 2, w, h, r);
      ctx.stroke();

      ctx.restore();
    }

    // Grading-house label themes (mirrors src/components/CardArt.tsx).
    const SLAB_THEME = {
      Bucket: { bg0: '#b45309', bg1: '#d97706', bg2: '#92400e', text: '#fffbeb', accent: '#fcd34d', border: '#78350f' },
      ZAG:    { bg0: '#0a5c9a', bg1: '#0972bf', bg2: '#075a99', text: '#f0f9ff', accent: '#7dd3fc', border: '#0c4a6e' },
      PZA:    { bg0: '#b91c1c', bg1: '#dc2626', bg2: '#991b1b', text: '#ffffff', accent: '#fee2e2', border: '#7f1d1d' },
    };

    // Renders a graded slab — plastic case + grading label + encased card.
    function drawSlabCard(ctx, cx, cy, w, rotDeg, s) {
      const grade = s.grade ?? 10;
      const theme = SLAB_THEME[s.company] || SLAB_THEME.Bucket;
      const img = LOADED[s.id];
      const h = w * 1.52;
      const r = w * 0.055;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate((rotDeg * Math.PI) / 180);

      // Plastic slab body + shadow
      ctx.save();
      ctx.shadowColor = 'rgba(15,23,42,0.5)';
      ctx.shadowBlur = w * 0.22;
      ctx.shadowOffsetY = w * 0.1;
      const slabG = ctx.createLinearGradient(0, -h / 2, 0, h / 2);
      slabG.addColorStop(0, '#cbd5e1');
      slabG.addColorStop(0.4, '#e2e8f0');
      slabG.addColorStop(1, '#94a3b8');
      ctx.fillStyle = slabG;
      roundRect(ctx, -w / 2, -h / 2, w, h, r);
      ctx.fill();
      ctx.restore();

      ctx.save();
      roundRect(ctx, -w / 2, -h / 2, w, h, r);
      ctx.clip();

      const lpad = w * 0.06;
      const labelTop = -h / 2;
      const labelH = h * 0.205;
      const lg = ctx.createLinearGradient(0, labelTop, 0, labelTop + labelH);
      lg.addColorStop(0, theme.bg0);
      lg.addColorStop(0.6, theme.bg1);
      lg.addColorStop(1, theme.bg2);
      ctx.fillStyle = lg;
      ctx.fillRect(-w / 2, labelTop, w, labelH);
      ctx.fillStyle = theme.border;
      ctx.fillRect(-w / 2, labelTop + labelH - w * 0.012, w, w * 0.012);

      // Label row 1 — company + GEM MINT
      ctx.textBaseline = 'top';
      ctx.textAlign = 'left';
      ctx.font = `900 ${w * 0.072}px "Segoe UI", system-ui, sans-serif`;
      ctx.fillStyle = theme.text;
      ctx.fillText((s.company || 'BUCKET').toUpperCase(), -w / 2 + lpad, labelTop + labelH * 0.12);
      ctx.textAlign = 'right';
      ctx.font = `700 ${w * 0.056}px "Segoe UI", system-ui, sans-serif`;
      ctx.fillStyle = theme.accent;
      ctx.fillText(grade >= 10 ? 'GEM MINT' : grade >= 9 ? 'MINT' : 'GRADED', w / 2 - lpad, labelTop + labelH * 0.15);

      // Label row 2 — card name + set/rarity
      const maxNm = w - lpad * 2 - w * 0.34;
      ctx.textAlign = 'left';
      ctx.font = `700 ${w * 0.064}px "Segoe UI", system-ui, sans-serif`;
      ctx.fillStyle = theme.text;
      let nm = s.name.toUpperCase();
      while (ctx.measureText(nm).width > maxNm && nm.length > 3) nm = nm.slice(0, -1);
      ctx.fillText(nm, -w / 2 + lpad, labelTop + labelH * 0.46);
      ctx.font = `600 ${w * 0.044}px "Segoe UI", system-ui, sans-serif`;
      ctx.fillStyle = theme.accent;
      let sub = `${s.set} • ${s.rarity}`.toUpperCase();
      while (ctx.measureText(sub).width > maxNm && sub.length > 3) sub = sub.slice(0, -1);
      ctx.fillText(sub, -w / 2 + lpad, labelTop + labelH * 0.7);

      // Big grade number
      ctx.textAlign = 'right';
      ctx.textBaseline = 'alphabetic';
      ctx.font = `900 ${w * 0.22}px "Segoe UI", system-ui, sans-serif`;
      ctx.save();
      ctx.shadowColor = grade >= 10 ? 'rgba(253,224,71,0.75)' : 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = w * 0.05;
      ctx.fillStyle = grade >= 10 ? '#fde047' : '#ffffff';
      ctx.fillText(String(grade), w / 2 - lpad, labelTop + labelH * 0.93);
      ctx.restore();

      // Encased card window
      const winMargin = w * 0.035;
      const certH = h * 0.082;
      const winX = -w / 2 + winMargin;
      const winY = labelTop + labelH + winMargin;
      const winW = w - winMargin * 2;
      const winH = h / 2 - winY - certH - winMargin;
      ctx.save();
      roundRect(ctx, winX, winY, winW, winH, r * 0.5);
      ctx.clip();
      const wg = ctx.createLinearGradient(winX, winY, winX + winW, winY + winH);
      wg.addColorStop(0, `hsl(${s.hue},70%,40%)`);
      wg.addColorStop(0.6, `hsl(${(s.hue + 24) % 360},66%,30%)`);
      wg.addColorStop(1, `hsl(${(s.hue + 200) % 360},60%,16%)`);
      ctx.fillStyle = wg;
      ctx.fillRect(winX, winY, winW, winH);
      if (img && img.width) {
        ctx.imageSmoothingEnabled = false;
        const scale = Math.min((winW * 0.82) / img.width, (winH * 0.82) / img.height);
        const iw = img.width * scale;
        const ih = img.height * scale;
        ctx.drawImage(img, -iw / 2, winY + winH / 2 - ih / 2, iw, ih);
      }
      const sh = ctx.createLinearGradient(winX, winY, winX + winW, winY + winH);
      sh.addColorStop(0.3, 'rgba(255,255,255,0)');
      sh.addColorStop(0.5, 'rgba(255,255,255,0.4)');
      sh.addColorStop(0.7, 'rgba(255,255,255,0)');
      ctx.globalCompositeOperation = 'screen';
      ctx.fillStyle = sh;
      ctx.fillRect(winX, winY, winW, winH);
      ctx.globalCompositeOperation = 'source-over';
      ctx.restore();
      ctx.lineWidth = w * 0.012;
      ctx.strokeStyle = 'rgba(15,23,42,0.5)';
      roundRect(ctx, winX, winY, winW, winH, r * 0.5);
      ctx.stroke();

      // Cert serial bar
      const certY = h / 2 - certH;
      const cg = ctx.createLinearGradient(0, certY, 0, certY + certH);
      cg.addColorStop(0, theme.bg1);
      cg.addColorStop(1, theme.bg2);
      ctx.fillStyle = cg;
      ctx.fillRect(-w / 2, certY, w, certH);
      ctx.fillStyle = theme.border;
      ctx.fillRect(-w / 2, certY, w, w * 0.01);
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'left';
      ctx.font = `700 ${w * 0.042}px "Segoe UI", system-ui, sans-serif`;
      ctx.fillStyle = theme.accent;
      ctx.fillText('CERT', -w / 2 + lpad, certY + certH / 2);
      ctx.textAlign = 'right';
      ctx.fillStyle = theme.text;
      ctx.font = `700 ${w * 0.05}px Consolas, "Courier New", monospace`;
      ctx.fillText(s.cert || 'BKT 0000000', w / 2 - lpad, certY + certH / 2);

      ctx.restore(); // unclip

      // Glass shine sweep over the whole slab
      ctx.save();
      roundRect(ctx, -w / 2, -h / 2, w, h, r);
      ctx.clip();
      const gl = ctx.createLinearGradient(-w / 2, -h / 2, w / 2, h / 2);
      gl.addColorStop(0.32, 'rgba(255,255,255,0)');
      gl.addColorStop(0.5, 'rgba(255,255,255,0.3)');
      gl.addColorStop(0.68, 'rgba(255,255,255,0)');
      ctx.globalCompositeOperation = 'screen';
      ctx.fillStyle = gl;
      ctx.fillRect(-w / 2, -h / 2, w, h);
      ctx.globalCompositeOperation = 'source-over';
      ctx.restore();

      // Slab outer frame
      ctx.lineWidth = w * 0.02;
      ctx.strokeStyle = '#475569';
      roundRect(ctx, -w / 2, -h / 2, w, h, r);
      ctx.stroke();

      ctx.restore();
    }

    function drawCardFan(ctx, cx, cy, cardW, count) {
      const items = [];
      for (let i = 0; i < count; i++) {
        const t = i - (count - 1) / 2;
        items.push({ t, sample: CARD_SAMPLES[i % CARD_SAMPLES.length] });
      }
      // Draw outer cards first so the centre card sits on top.
      items.sort((a, b) => Math.abs(b.t) - Math.abs(a.t));
      for (const it of items) {
        const ox = it.t * cardW * 0.5;
        const oy = Math.abs(it.t) * cardW * 0.13;
        if (it.sample.slab) {
          // Slabs are taller — lift slightly and scale up so it reads as the hero.
          drawSlabCard(ctx, cx + ox, cy + oy - cardW * 0.06, cardW * 1.05, it.t * 9, it.sample);
        } else {
          drawRealCard(ctx, cx + ox, cy + oy, cardW, it.t * 9, it.sample, LOADED[it.sample.id]);
        }
      }
    }

    function font(px) {
      return `900 ${px}px "Segoe UI", system-ui, Arial, sans-serif`;
    }

    function drawSpaced(ctx, text, cx, y, fs, color, tracking, shadow) {
      ctx.font = `800 ${fs}px "Segoe UI", system-ui, Arial, sans-serif`;
      const widths = [...text].map((c) => ctx.measureText(c).width);
      const space = fs * tracking;
      const total = widths.reduce((a, w) => a + w, 0) + space * (text.length - 1);
      let x = cx - total / 2;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
      for (let i = 0; i < text.length; i++) {
        ctx.save();
        if (shadow) {
          ctx.shadowColor = 'rgba(0,0,0,0.35)';
          ctx.shadowBlur = fs * 0.14;
          ctx.shadowOffsetY = fs * 0.08;
        }
        ctx.fillStyle = color;
        ctx.fillText(text[i], x, y);
        ctx.restore();
        x += widths[i] + space;
      }
    }

    function drawLogo(ctx, cx, cy, targetW, shadow) {
      let fs = 240;
      ctx.font = font(fs);
      let w = LETTERS.reduce((a, [ch]) => a + ctx.measureText(ch).width, 0);
      fs = (fs * targetW) / w;
      ctx.font = font(fs);
      w = LETTERS.reduce((a, [ch]) => a + ctx.measureText(ch).width, 0);

      const subFs = fs * 0.205;
      const gap = fs * 0.3;
      const blockH = fs * 0.72 + gap + subFs;
      const topY = cy - blockH / 2;
      const baseY = topY + fs * 0.72;

      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
      let x = cx - w / 2;
      for (const [ch, color] of LETTERS) {
        ctx.save();
        if (shadow) {
          ctx.shadowColor = 'rgba(0,0,0,0.4)';
          ctx.shadowBlur = fs * 0.07;
          ctx.shadowOffsetY = fs * 0.045;
        }
        ctx.fillStyle = color;
        ctx.font = font(fs);
        ctx.fillText(ch, x, baseY);
        ctx.restore();
        x += ctx.measureText(ch).width;
      }
      drawSpaced(ctx, 'SIMULATOR', cx, baseY + gap + subFs * 0.5, subFs, '#26282b', 0.44, shadow);
    }

    function render(canvas, asset) {
      const ctx = canvas.getContext('2d');
      const W = asset.w, H = asset.h;
      ctx.clearRect(0, 0, W, H);

      if (asset.kind === 'logo') {
        drawLogo(ctx, W / 2, H / 2, Math.min(W * 0.82, 1040), true);
        return;
      }

      drawBackground(ctx, W, H);

      if (asset.kind === 'hero') {
        drawCardFan(ctx, W * 0.5, H * 0.52, H * 0.56, 5);
        return;
      }
      if (asset.kind === 'background') {
        ctx.save();
        ctx.globalAlpha = 0.32;
        drawCardFan(ctx, W * 0.6, H * 0.58, H * 0.5, 5);
        ctx.restore();
        return;
      }
      if (asset.kind === 'small') {
        ctx.save();
        ctx.globalAlpha = 0.5;
        drawCardFan(ctx, W * 0.9, H * 0.62, H * 0.42, 3);
        ctx.restore();
        drawLogo(ctx, W * 0.5, H * 0.5, W * 0.84, true);
        return;
      }
      if (asset.kind === 'vertical') {
        // Fan sits lower so the slab's top edge clears the logo; slightly
        // smaller cards keep the lower fan from clipping the bottom edge.
        drawCardFan(ctx, W * 0.5, H * 0.68, W * 0.4, 5);
        drawLogo(ctx, W * 0.5, H * 0.26, W * 0.78, true);
        return;
      }
      // capsule (horizontal)
      drawCardFan(ctx, W * 0.71, H * 0.56, H * 0.42, 5);
      drawLogo(ctx, W * 0.33, H * 0.47, W * 0.46, true);
    }

    function download(canvas, filename) {
      canvas.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 2000);
      }, 'image/png');
    }

    const grid = document.getElementById('grid');
    const built = [];
    for (const asset of ASSETS) {
      const canvas = document.createElement('canvas');
      canvas.width = asset.w;
      canvas.height = asset.h;
      built.push({ asset, canvas });

      const row = document.createElement('div');
      row.className = 'asset';
      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.innerHTML =
        `<b>${asset.label}</b><span>${asset.w} &times; ${asset.h}px</span>` +
        `<span>${asset.id}.png</span>`;
      const prev = document.createElement('div');
      prev.className = 'preview';
      prev.appendChild(canvas);
      const btn = document.createElement('button');
      btn.textContent = 'Download';
      btn.addEventListener('click', () => download(canvas, asset.id + '.png'));
      meta.appendChild(document.createElement('br'));
      meta.appendChild(btn);
      row.appendChild(meta);
      row.appendChild(prev);
      grid.appendChild(row);
    }

    // Render once the creature art has loaded.
    loadImages().then(() => {
      for (const b of built) render(b.canvas, b.asset);
    });

    document.getElementById('all').addEventListener('click', () => {
      built.forEach((b, i) => {
        setTimeout(() => download(b.canvas, b.asset.id + '.png'), i * 400);
      });
    });

    // ---- Save straight into a folder (File System Access API) ----------------
    const statusEl = document.getElementById('status');
    const setStatus = (m) => { statusEl.textContent = m; };

    function openDb() {
      return new Promise((res, rej) => {
        const r = indexedDB.open('feebay-steam-assets', 1);
        r.onupgradeneeded = () => r.result.createObjectStore('handles');
        r.onsuccess = () => res(r.result);
        r.onerror = () => rej(r.error);
      });
    }
    async function rememberDir(handle) {
      const db = await openDb();
      await new Promise((res, rej) => {
        const tx = db.transaction('handles', 'readwrite');
        tx.objectStore('handles').put(handle, 'dir');
        tx.oncomplete = res;
        tx.onerror = () => rej(tx.error);
      });
    }
    async function recallDir() {
      try {
        const db = await openDb();
        return await new Promise((res) => {
          const tx = db.transaction('handles', 'readonly');
          const rq = tx.objectStore('handles').get('dir');
          rq.onsuccess = () => res(rq.result || null);
          rq.onerror = () => res(null);
        });
      } catch {
        return null;
      }
    }
    async function getTargetDir() {
      let handle = await recallDir();
      if (handle) {
        let perm = await handle.queryPermission({ mode: 'readwrite' });
        if (perm !== 'granted') perm = await handle.requestPermission({ mode: 'readwrite' });
        if (perm === 'granted') return handle;
      }
      handle = await window.showDirectoryPicker({ id: 'feebay-steam-assets', mode: 'readwrite' });
      await rememberDir(handle);
      return handle;
    }
    async function writeInto(dir, name, blob) {
      const fh = await dir.getFileHandle(name, { create: true });
      const w = await fh.createWritable();
      await w.write(blob);
      await w.close();
    }
    async function saveAllToFolder() {
      try {
        setStatus('Choose your SteamAssets folder…');
        const dir = await getTargetDir();
        setStatus(`Writing 9 PNGs into "${dir.name}"…`);
        for (const b of built) {
          const blob = await new Promise((r) => b.canvas.toBlob(r, 'image/png'));
          await writeInto(dir, b.asset.id + '.png', blob);
        }
        setStatus(`Done — 9 PNGs saved to "${dir.name}" (existing files overwritten).`);
      } catch (e) {
        setStatus('Save cancelled: ' + (e && e.message ? e.message : e));
      }
    }

    const saveBtn = document.getElementById('save');
    if (window.showDirectoryPicker) {
      saveBtn.addEventListener('click', saveAllToFolder);
      setStatus('Click "Save all to SteamAssets folder" and pick E:\\ProjectArea\\FeeBay\\SteamAssets — it is remembered after the first time.');
    } else {
      saveBtn.disabled = true;
      saveBtn.textContent = 'Folder save needs Chrome/Edge';
      setStatus('Direct folder saving needs Chrome or Edge. In other browsers, use "Download all 9 PNGs".');
    }
  </script>
</body>
</html>
